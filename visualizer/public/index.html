<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Point Cloud Viewer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.181.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.181.1/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    const scene = new THREE.Scene()

    const camera = new THREE.PerspectiveCamera(
      40,
      window.innerWidth / window.innerHeight,
      0.01,
      1000
    )

    camera.position.set(0.5, 0.5, 2.5)

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    document.body.appendChild(renderer.domElement)

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.target.set(0.5, 0.5, 0.5)
    controls.enableDamping = true
    controls.dampingFactor = 0.05

    // Add unit-sized axes helper (X = red, Y = green, Z = blue)
    const axesHelper = new THREE.AxesHelper(1.2)
    scene.add(axesHelper)

    // Add outer boundaries of the plot (unit box from [0,0,0] to [1,1,1] centered at 0.5,0.5,0.5)
    const boxGeo = new THREE.BoxGeometry(1, 1, 1)
    const edges = new THREE.EdgesGeometry(boxGeo)
    const lineMesh = new THREE.LineSegments(edges, new THREE.LineDashedMaterial({ color: 0x444444 }))
    lineMesh.position.set(0.5, 0.5, 0.5)
    scene.add(lineMesh)

    let geometry = null
    let pointsObject = null

    function updatePointCloud(points) {
      const vertices = new Float32Array(points.flat())

      // Map positions directly as RGB colors, clamped to [0, 1] range
      const colors = new Float32Array(vertices.length)
      for (let i = 0; i < vertices.length; i++) {
        colors[i] = Math.max(0, Math.min(1, vertices[i]))
      }

      if (!geometry) {
        geometry = new THREE.BufferGeometry()

        geometry.setAttribute(
          'position',
          new THREE.BufferAttribute(vertices, 3)
        )

        geometry.setAttribute(
          'color',
          new THREE.BufferAttribute(colors, 3)
        )

        // Translate so pivot is at (0.5, 0.5, 0)
        geometry.translate(-0.5, -0.5, 0)

        const material = new THREE.PointsMaterial({
          size: 0.004,
          vertexColors: true
        })

        pointsObject = new THREE.Points(geometry, material)
        pointsObject.position.set(0.5, 0.5, 0)
        scene.add(pointsObject)
      } else {
        geometry.setAttribute(
          'position',
          new THREE.BufferAttribute(vertices, 3)
        )

        geometry.setAttribute(
          'color',
          new THREE.BufferAttribute(colors, 3)
        )

        // Translate update as well
        geometry.translate(-0.5, -0.5, 0)

        geometry.attributes.position.needsUpdate = true
        geometry.attributes.color.needsUpdate = true
      }
    }

    const events = new EventSource('/events')

    events.onmessage = (event) => {
      const points = JSON.parse(event.data)
      updatePointCloud(points)
    }

    function animate() {
      requestAnimationFrame(animate)

      controls.update()

      renderer.render(scene, camera)
    }

    animate()

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    });
  </script>
</body>

</html>
